name: Publish to Maven Central

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: maven-central-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
        run: |
          set -euo pipefail
          printf '%s' "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --export-secret-keys "$SIGNING_KEY_ID" > "${GITHUB_WORKSPACE}/secring.gpg"
          chmod 600 "${GITHUB_WORKSPACE}/secring.gpg"

      - name: Publish to Maven Central
        run: |
          ./gradlew publishToMavenCentral --no-daemon --stacktrace \
            -PmavenCentralUsername="${{ secrets.MAVEN_CENTRAL_USERNAME }}" \
            -PmavenCentralPassword="${{ secrets.MAVEN_CENTRAL_PASSWORD }}" \
            -Psigning.keyId="${{ secrets.SIGNING_KEY_ID }}" \
            -Psigning.password="${{ secrets.GPG_PASSPHRASE }}" \
            -Psigning.secretKeyRingFile="${GITHUB_WORKSPACE}/secring.gpg"
